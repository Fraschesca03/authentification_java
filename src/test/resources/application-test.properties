# Clé fictive pour les tests ? jamais la vraie clé de production
app.master-key=test_master_key_for_ci_only_32chars!

# Base H2 en mémoire ? pas besoin de MySQL pour les tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate recrée la base à chaque test et la supprime après
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect