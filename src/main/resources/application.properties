spring.application.name=authentification

spring.datasource.url=jdbc:mysql://host.docker.internal:3306/auth_bdd?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

logging.level.com.projetAuthentification=INFO

app.master-key=${APP_MASTER_KEY}
app.auth.timestamp-window=60
app.auth.nonce-ttl=120
app.auth.token-ttl=15